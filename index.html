<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart City Grievance</title>

<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-container">
    <div class="login-image">
        <img src="city.jpg">
    </div>

    <div class="login-form">
        <h2>Smart City Grievance</h2>
        <input type="text" id="username" placeholder="Enter Username">
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- MAIN -->
<div id="mainApp" class="hidden">

    <div class="navbar">
        <h2>Smart City</h2>
        <span id="userDisplay"></span>
    </div>

    <div class="container">

        <!-- FORM -->
        <div class="card">
            <h3>Submit Complaint</h3>

            <input type="text" id="name" placeholder="Your Name">
            <textarea id="complaint" placeholder="Enter complaint"></textarea>

            <input type="text" id="location" readonly placeholder="Location">
            <button onclick="getLocation()">📍 Get Location</button>

            <button onclick="submitComplaint()">Submit</button>
        </div>

        <!-- LIST -->
        <div class="card">
            <h3>Complaints</h3>
            <ul id="complaintList"></ul>
        </div>

        <!-- MAP -->
        <div id="mapContainer" class="card hidden">
            <h3>Location Map</h3>
            <iframe id="mapFrame" width="100%" height="300"></iframe>
        </div>

    </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
