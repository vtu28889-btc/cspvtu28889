<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart City Grievance System</title>

<!-- Favicon -->
<link rel="icon" href="favicon.ico">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage" class="login-container">
    
    <div class="login-image">
        <img src="city.jpg" alt="City Image">
    </div>

    <div class="login-form">
        <h2><i class="fas fa-city"></i> Smart City Grievance</h2>
        <p>Report issues easily & track complaints</p>

        <input type="text" id="username" placeholder="Enter Username">
        <button onclick="login()">Login</button>
    </div>

</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">

    <!-- NAVBAR -->
    <div class="navbar">
        <h2><i class="fas fa-building"></i> Smart City Dashboard</h2>
        <span id="userDisplay"></span>
    </div>

    <div class="container">

        <!-- COMPLAINT FORM -->
        <div class="card">
            <h3><i class="fas fa-edit"></i> Submit Complaint</h3>

            <input type="text" id="name" placeholder="Your Name">

            <textarea id="complaint" placeholder="Describe your issue"></textarea>

            <input type="text" id="location" placeholder="Location (GPS)" readonly>

            <button onclick="getLocation()">
                <i class="fas fa-map-marker-alt"></i> Get Location
            </button>

            <button onclick="submitComplaint()">
                <i class="fas fa-paper-plane"></i> Submit
            </button>
        </div>

        <!-- COMPLAINT LIST -->
        <div class="card">
            <h3><i class="fas fa-list"></i> Complaints</h3>
            <ul id="complaintList"></ul>
        </div>

        <!-- MAP VIEW -->
        <div id="mapContainer" class="card hidden">
            <h3><i class="fas fa-map"></i> Location Map</h3>
            <iframe 
                id="mapFrame" 
                width="100%" 
                height="300" 
                style="border:0;"
                loading="lazy">
            </iframe>
        </div>

    </div>

</div>

<!-- SCRIPT (IMPORTANT: module type for Firebase) -->
<script type="module" src="script.js"></script>

</body>
</html>
