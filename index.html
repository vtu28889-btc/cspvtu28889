<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart City Grievance</title>

<link rel="stylesheet" href="style.css">

<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-container">

    <div class="login-image">
        <img src="city.jpg">
    </div>

    <div class="login-form">
        <h2>Smart City Grievance</h2>
        <p>Report & track city issues efficiently</p>

        <input type="text" id="username" placeholder="Enter Username">
        <button onclick="login()">Login</button>
    </div>

</div>

<!-- MAIN -->
<div id="mainApp" class="hidden">

    <div class="navbar">
        <h2><i class="fas fa-city"></i> Smart City</h2>
        <span id="userDisplay"></span>
    </div>

    <div class="container">

        <!-- DASHBOARD -->
        <div class="dashboard">
            <div class="box total"><i class="fas fa-list"></i><br>Total <br><span id="total"></span></div>
            <div class="box pending"><i class="fas fa-clock"></i><br>Pending <br><span id="pending"></span></div>
            <div class="box resolved"><i class="fas fa-check-circle"></i><br>Resolved <br><span id="resolved"></span></div>
        </div>

        <!-- NAV -->
        <div class="nav-buttons">
            <button onclick="showSection('form')"><i class="fas fa-plus"></i> Submit</button>
            <button onclick="showSection('track')"><i class="fas fa-search"></i> Track</button>
        </div>

        <!-- FORM -->
        <div id="formSection" class="card">
            <h3><i class="fas fa-edit"></i> Submit Complaint</h3>

            <input type="text" id="name" placeholder="Your Name">

            <select id="category">
                <option>Road Issue</option>
                <option>Water Problem</option>
                <option>Electricity</option>
                <option>Garbage</option>
            </select>

            <textarea id="complaint" placeholder="Describe issue"></textarea>

            <input type="text" id="location" placeholder="Location" readonly>
            <button onclick="getLocation()"><i class="fas fa-map-marker-alt"></i> Get Location</button>

            <button onclick="submitComplaint()">Submit</button>
        </div>

        <!-- TRACK -->
        <div id="trackSection" class="card hidden">
            <h3><i class="fas fa-list"></i> Track Complaints</h3>

            <input type="text" id="search" placeholder="Search..." onkeyup="searchComplaint()">

            <ul id="complaintList"></ul>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
