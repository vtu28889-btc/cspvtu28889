<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart City Grievance System</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
}

header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    width: 80%;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 8px;
}

input, textarea, select, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

button {
    background: #3498db;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #2980b9;
}

.hidden {
    display: none;
}
</style>

</head>

<body>

<header>
    <h2>Smart City Grievance System</h2>
</header>

<div class="container">

    <!-- LOGIN -->
    <div class="card" id="loginPage">
        <h3>Login</h3>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="login()">Login</button>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden">

        <!-- Complaint Form -->
        <div class="card">
            <h3>Submit Complaint</h3>
            <input type="text" id="name" placeholder="Your Name">
            
            <select id="category">
                <option>Road Issue</option>
                <option>Water Problem</option>
                <option>Electricity</option>
                <option>Garbage</option>
            </select>

            <textarea id="complaint" placeholder="Describe your issue"></textarea>

            <button onclick="submitComplaint()">Submit</button>
        </div>

        <!-- Complaint List -->
        <div class="card">
            <h3>Track Complaints</h3>
            <ul id="complaintList"></ul>
        </div>

    </div>

</div>

<script>
function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user && pass) {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("mainApp").classList.remove("hidden");
        loadComplaints();
    } else {
        alert("Enter valid login details");
    }
}

function submitComplaint() {
    let name = document.getElementById("name").value;
    let category = document.getElementById("category").value;
    let complaint = document.getElementById("complaint").value;

    if(!name || !complaint) {
        alert("Please fill all fields");
        return;
    }

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.push({
        name,
        category,
        complaint,
        status: "Pending"
    });

    localStorage.setItem("complaints", JSON.stringify(complaints));

    alert("Complaint Submitted!");
    loadComplaints();
}

function loadComplaints() {
    let list = document.getElementById("complaintList");
    list.innerHTML = "";

    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];

    complaints.forEach((c, index) => {
        let li = document.createElement("li");
        li.innerHTML = `<b>${c.name}</b> (${c.category}) - ${c.complaint} <br>Status: ${c.status}`;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
